@if (toasts().length > 0) {
  <div
    class="toast toast-top toast-end z-50 space-y-2"
    >
    @for (t of toasts(); track t) {
      <div class="alert alert-info alert-soft shadow-lg flex items-start gap-3">
        <span class="text-sm font-medium">
          {{ t.message }}
          @if (t.address) {
            <span class="block text-xs opacity-70">{{
              t.address
            }}</span>
          }
        </span>
        <button
          class="btn btn-xs"
          (click)="dismiss(t.id)"
          aria-label="Cerrar notificación"
          >
          Cerrar
        </button>
      </div>
    }
    <div class="flex justify-end gap-2">
      @if (!notif.soundEnabled()) {
        <button
          class="btn btn-xs"
          (click)="notif.enableSound()"
          >
          Activar sonido
        </button>
      }
      @if (notif.soundEnabled()) {
        <button
          class="btn btn-xs"
          (click)="notif.disableSound()"
          >
          Silenciar
        </button>
      }
    </div>
  </div>
}
