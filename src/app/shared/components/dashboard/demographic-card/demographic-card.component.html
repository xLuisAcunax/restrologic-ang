<div class="card shadow-sm rounded-2xl bg-base-100 sm:p-6 p-4">
  <div class="flex justify-between">
    <div>
      <h3 class="text-lg font-semibold">Pomodoro</h3>
      <p class="mt-1">Número de clientes basado en sucursales</p>
    </div>
    <div class="relative inline-block"></div>
  </div>

  <div class="px-4 py-6 my-6 overflow-hidden rounded-2xl sm:px-6">
    <figure>
      <img src="/images/pomodoro.png" alt="Map" class="size-1/2" />
    </figure>
  </div>

  <div class="space-y-5">
    @for (country of countries; track $index) {
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="items-center w-full rounded-full max-w-8">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="40"
            height="40"
            viewBox="0 0 48 48"
          >
            <path
              fill="#D8B0FF"
              fill-rule="evenodd"
              d="M4.5 21C4.5 10.23 13.23 1.5 24 1.5S43.5 10.23 43.5 21c0 6.987-3.606 12.865-7.526 17.203c-3.932 4.351-8.326 7.316-10.237 8.506a3.26 3.26 0 0 1-3.474 0c-1.91-1.19-6.305-4.155-10.237-8.506C8.106 33.865 4.5 27.987 4.5 21m17.28-9.807c.933-1.799 3.506-1.799 4.44 0l2.044 3.941l4.377.862c1.904.375 2.673 2.682 1.376 4.125l-3.133 3.484l.572 4.635c.244 1.98-1.813 3.434-3.598 2.543L24 28.857l-3.859 1.926c-1.784.89-3.842-.564-3.597-2.543l.572-4.635l-3.133-3.484c-1.297-1.443-.528-3.75 1.376-4.125l4.377-.862z"
              clip-rule="evenodd"
            />
          </svg>
        </div>
        <div>
          <p class="font-semibold">
            {{ country.name }}
          </p>
          <span class="block">
            {{ country.customers }}
          </span>
        </div>
      </div>

      <div class="flex w-full max-w-[140px] items-center gap-3">
        <div class="relative block h-2 w-full max-w-[100px] rounded-sm">
          <div
            class="absolute left-0 top-0 flex h-full items-center justify-center rounded-sm bg-brand-500 text-xs font-medium"
            [ngStyle]="{ width: country.percent + '%' }"
          ></div>
        </div>
        <p class="font-medium">{{ country.percent }}%</p>
      </div>
    </div>
    }
  </div>
</div>
