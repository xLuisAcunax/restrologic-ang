<div class="min-h-screen xl:flex bg-base-200">
  <!-- Sidebar & Backdrop -->
  <div class="z-50">
    <app-sidebar></app-sidebar>
    <app-backdrop></app-backdrop>
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-h-screen transition-all duration-300 ease-spring" [ngClass]="{
      'xl:ml-[290px]': (isExpanded$ | async) || (isHovered$ | async),
      'xl:ml-[90px]': !(isExpanded$ | async) && !(isHovered$ | async),
      'ml-0': (isMobileOpen$ | async)
    }">
    <!-- Header -->
    <div class="sticky top-0 z-40 bg-base-100/80 backdrop-blur-md border-b border-base-300">
      <app-header />
    </div>

    <!-- Toast Container -->
    <delivery-order-toast-container></delivery-order-toast-container>

    <!-- Page Content -->
    <main class="flex-1 p-4 md:p-6 lg:p-8 overflow-x-hidden">
      <div class="max-w-7xl mx-auto w-full">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
