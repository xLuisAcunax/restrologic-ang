<div class="flex flex-col w-full bg-base-100">
  <div
    class="flex-none px-6 py-4 border-b border-base-200 flex justify-between items-center bg-base-100"
  >
    <h2 class="text-xl font-bold text-base-content flex items-center gap-2">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 text-primary"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
        />
      </svg>
      {{ form.get("id")?.value ? "Editar Sucursal" : "Nueva Sucursal" }}
    </h2>
    <button
      (click)="dialogRef.close('Canceled')"
      class="btn btn-sm btn-ghost btn-circle"
    >
      &times;
    </button>
  </div>

  <div class="p-6">
    <form [formGroup]="form" class="flex flex-col gap-5">
      <div class="form-control w-full">
        <label class="label"
          ><span class="label-text font-bold"
            >Nombre de la Sucursal</span
          ></label
        >
        <input
          type="text"
          class="input input-bordered w-full focus:input-primary"
          placeholder="Ej. Sede Norte, Centro Comercial..."
          formControlName="name"
        />
      </div>

      <div class="form-control w-full">
        <label class="label"
          ><span class="label-text font-bold">Dirección Física</span></label
        >
        <div class="relative">
          <input
            type="text"
            class="input input-bordered w-full pl-10 focus:input-primary"
            placeholder="Calle 123 # 45-67"
            formControlName="address"
          />
          <div
            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-base-content/40"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"
                clip-rule="evenodd"
              />
            </svg>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-control w-full">
          <label class="label"
            ><span class="label-text font-bold">Ciudad</span></label
          >
          <input
            type="text"
            class="input input-bordered w-full focus:input-primary"
            placeholder="Barranquilla"
            formControlName="city"
          />
        </div>

        <div class="form-control w-full">
          <label class="label"
            ><span class="label-text font-bold">País</span></label
          >
          <input
            type="text"
            class="input input-bordered w-full focus:input-primary"
            placeholder="Colombia"
            formControlName="country"
          />
        </div>
      </div>

      <div class="form-control w-full">
        <label class="label"
          ><span class="label-text font-bold"
            >Descripción / Referencia</span
          ></label
        >
        <textarea
          class="textarea textarea-bordered h-24 focus:textarea-primary resize-none"
          placeholder="Ej. Ubicado frente al parque central..."
          formControlName="description"
        >
        </textarea>
      </div>
    </form>
  </div>

  <div
    class="flex-none px-6 py-4 border-t border-base-200 bg-base-100 flex justify-end gap-3"
  >
    <button
      type="button"
      class="btn btn-ghost hover:bg-base-200"
      (click)="dialogRef.close('Canceled')"
    >
      Cancelar
    </button>

    <button
      type="button"
      class="btn btn-primary px-6"
      (click)="onSaving()"
      [disabled]="!form.valid"
    >
      Guardar
    </button>
  </div>
</div>
