<div class="w-full min-h-screen bg-base-200/30 p-4 md:p-8">
  <div class="w-[95%] 2xl:w-[90%] max-w-[1920px] mx-auto space-y-6 mb-6">
    <div
      class="flex flex-col md:flex-row md:items-center justify-between gap-4"
    >
      <div>
        <h1 class="text-3xl font-extrabold text-base-content tracking-tight">
          Gestión de Catálogo
        </h1>
        <p class="text-base-content/60 mt-1 font-medium">
          Administra tus productos, precios y variaciones en todas las
          sucursales.
        </p>
      </div>

      <div class="flex items-center gap-2"></div>
    </div>

    <div class="w-full overflow-x-auto pb-2">
      <div
        role="tablist"
        class="flex p-1 bg-white rounded-xl border border-base-200 shadow-sm w-fit mx-auto md:mx-0"
      >
        <button
          role="tab"
          class="px-5 py-2 rounded-lg text-sm font-medium transition-all duration-200"
          [class.bg-base-200]="activeTab() === 'products'"
          [class.text-base-content]="activeTab() === 'products'"
          [class.font-bold]="activeTab() === 'products'"
          [class.text-base-content-secondary]="activeTab() !== 'products'"
          [class.hover:bg-base-100]="activeTab() !== 'products'"
          (click)="activeTab.set('products')"
        >
          Productos
        </button>

        <button
          role="tab"
          class="px-5 py-2 rounded-lg text-sm font-medium transition-all duration-200"
          [class.bg-base-200]="activeTab() === 'categories'"
          [class.text-base-content]="activeTab() === 'categories'"
          [class.font-bold]="activeTab() === 'categories'"
          [class.text-base-content-secondary]="activeTab() !== 'categories'"
          [class.hover:bg-base-100]="activeTab() !== 'categories'"
          (click)="activeTab.set('categories')"
        >
          Categorías
        </button>

        <button
          role="tab"
          class="px-5 py-2 rounded-lg text-sm font-medium transition-all duration-200"
          [class.bg-base-200]="activeTab() === 'subcategories'"
          [class.text-base-content]="activeTab() === 'subcategories'"
          [class.font-bold]="activeTab() === 'subcategories'"
          [class.text-base-content-secondary]="activeTab() !== 'subcategories'"
          [class.hover:bg-base-100]="activeTab() !== 'subcategories'"
          (click)="activeTab.set('subcategories')"
        >
          Subcategorías
        </button>

        <button
          role="tab"
          class="px-5 py-2 rounded-lg text-sm font-medium transition-all duration-200"
          [class.bg-base-200]="activeTab() === 'sizes'"
          [class.text-base-content]="activeTab() === 'sizes'"
          [class.font-bold]="activeTab() === 'sizes'"
          [class.text-base-content-secondary]="activeTab() !== 'sizes'"
          [class.hover:bg-base-100]="activeTab() !== 'sizes'"
          (click)="activeTab.set('sizes')"
        >
          Porciones
        </button>

        <button
          role="tab"
          class="px-5 py-2 rounded-lg text-sm font-medium transition-all duration-200"
          [class.bg-base-200]="activeTab() === 'bundles'"
          [class.text-base-content]="activeTab() === 'bundles'"
          [class.font-bold]="activeTab() === 'bundles'"
          [class.text-base-content-secondary]="activeTab() !== 'bundles'"
          [class.hover:bg-base-100]="activeTab() !== 'bundles'"
          (click)="activeTab.set('bundles')"
        >
          Modificadores
        </button>

        <button
          role="tab"
          class="px-5 py-2 rounded-lg text-sm font-medium transition-all duration-200"
          [class.bg-base-200]="activeTab() === 'bundleGroups'"
          [class.text-base-content]="activeTab() === 'bundleGroups'"
          [class.font-bold]="activeTab() === 'bundleGroups'"
          [class.text-base-content-secondary]="activeTab() !== 'bundleGroups'"
          [class.hover:bg-base-100]="activeTab() !== 'bundleGroups'"
          (click)="activeTab.set('bundleGroups')"
        >
          Grupos de Modificadores
        </button>

        <button
          role="tab"
          class="px-5 py-2 rounded-lg text-sm font-medium transition-all duration-200"
          [class.bg-base-200]="activeTab() === 'priceAdjustments'"
          [class.text-base-content]="activeTab() === 'priceAdjustments'"
          [class.font-bold]="activeTab() === 'priceAdjustments'"
          [class.text-base-content-secondary]="
            activeTab() !== 'priceAdjustments'
          "
          [class.hover:bg-base-100]="activeTab() !== 'priceAdjustments'"
          (click)="activeTab.set('priceAdjustments')"
        >
          Ajustes de precio
        </button>
      </div>
    </div>
  </div>

  <div class="w-[95%] 2xl:w-[90%] max-w-[1920px] mx-auto">
    @if (branches()) {
      <div
        class="card bg-base-100 shadow-xl border border-base-200 rounded-2xl overflow-hidden"
      >
        <div class="card-body p-0">
          <div class="animate-fade-in-up">
            <div [hidden]="activeTab() !== 'products'">
              <products-tab />
            </div>

            <div [hidden]="activeTab() !== 'categories'">
              <categories-tab />
            </div>

            <div [hidden]="activeTab() !== 'subcategories'">
              <subcategories-tab />
            </div>

            <div [hidden]="activeTab() !== 'sizes'">
              <product-size-tab />
            </div>

            <div [hidden]="activeTab() !== 'bundles'">
              <bundles-tab />
            </div>

            <div [hidden]="activeTab() !== 'bundleGroups'">
              <bundle-groups-tab />
            </div>

            <div [hidden]="activeTab() !== 'priceAdjustments'">
              <price-adjustment-tab />
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>

<style>
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .animate-fade-in-up {
    animation: fadeInUp 0.3s ease-out forwards;
  }
</style>
