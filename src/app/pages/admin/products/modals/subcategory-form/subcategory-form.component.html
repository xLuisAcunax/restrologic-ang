<div class="flex flex-col w-full bg-base-100">
  <div
    class="flex-none px-6 py-4 border-b border-base-200 flex justify-between items-center bg-base-100"
  >
    <h2 class="text-xl font-bold text-base-content flex items-center gap-2">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 text-primary"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
        />
      </svg>
      {{ form.get("id")?.value ? "Editar Subcategoría" : "Nueva Subcategoría" }}
    </h2>
    <button
      (click)="dialogRef.close('Canceled')"
      class="btn btn-sm btn-ghost btn-circle"
    >
      ✕
    </button>
  </div>

  <div class="p-6 overflow-y-auto">
    <form [formGroup]="form" class="flex flex-col gap-5">
      <div class="form-control w-full">
        <label class="label">
          <span
            class="label-text text-xs font-bold uppercase text-base-content/50"
            >Categoría Padre</span
          >
        </label>
        <div class="relative">
          <select
            class="select select-bordered w-full bg-base-200 text-base-content/70 cursor-not-allowed"
            formControlName="categoryId"
          >
            <option [ngValue]="''">Sin categoría</option>
            @for (category of categoryService.categories(); track $index) {
              <option [ngValue]="category.id">{{ category.name }}</option>
            }
          </select>
          <div
            class="absolute inset-y-0 right-8 flex items-center pointer-events-none"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4 text-base-content/40"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                clip-rule="evenodd"
              />
            </svg>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-control w-full">
          <label class="label"
            ><span class="label-text font-bold">Nombre</span></label
          >
          <input
            type="text"
            class="input input-bordered w-full focus:input-primary"
            placeholder="Ej. Tradicional"
            formControlName="name"
          />
        </div>

        <div class="form-control w-full">
          <label class="label">
            <span class="label-text font-bold">Ajuste de Precio</span>
          </label>
          <label
            class="input input-bordered flex items-center gap-2 focus-within:outline-primary focus-within:outline focus-within:outline-2"
          >
            <span class="text-base-content/50 font-bold">$</span>
            <input
              type="number"
              class="grow font-mono font-bold"
              placeholder="0.00"
              formControlName="priceAdjustment"
            />
          </label>
          <label class="label">
            <span class="label-text-alt text-base-content/60"
              >Valor que se suma al precio base.</span
            >
          </label>
        </div>
      </div>

      <div class="bg-base-200/50 p-4 rounded-xl border border-base-200 mt-2">
        <div class="form-control">
          <label class="label cursor-pointer justify-between">
            <div class="flex flex-col">
              <span class="label-text font-bold text-base"
                >Subcategoría Activa</span
              >
              <span class="label-text-alt text-base-content/60 mt-0.5"
                >Habilitar selección en el POS</span
              >
            </div>
            <input
              type="checkbox"
              class="toggle toggle-success"
              formControlName="isActive"
            />
          </label>
        </div>
      </div>
    </form>
  </div>

  <div
    class="flex-none px-6 py-4 border-t border-base-200 bg-base-100 flex justify-end gap-3"
  >
    <button
      type="button"
      class="btn btn-ghost hover:bg-base-200"
      (click)="dialogRef.close('Canceled')"
    >
      Cancelar
    </button>

    <button
      type="button"
      class="btn btn-primary px-6"
      (click)="onSaving()"
      [disabled]="!form.valid"
    >
      Guardar
    </button>
  </div>
</div>
