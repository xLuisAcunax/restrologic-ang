<div class="ol-route-container">
  <div class="header">
    <h1>Ruta (OpenLayers)</h1>
    @if (!loading()) {
      <span class="small"
        >{{ deliveryStops().length }} entregas</span
        >
      }
    </div>

    <div class="map-wrapper">
      <div id="olmap" class="map"></div>
      @if (loading()) {
        <div class="loading">Cargando mapa…</div>
      }
    </div>
  </div>
