<div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
  <div class="card-body">
    <h2 class="card-title">{{ dialogTitle }}</h2>
    <form [formGroup]="form" class="fieldset">
      <label class="label">Nombre</label>
      <input
        type="text"
        class="input"
        placeholder="Nombre"
        formControlName="name"
      />
      <label class="label">Direccion</label>
      <input
        type="text"
        class="input"
        placeholder="Direccion"
        formControlName="address"
      />
      <label class="label">Ciudad</label>
      <input
        type="text"
        class="input"
        placeholder="Ciudad"
        formControlName="city"
      />
      <label class="label">Pais</label>
      <input
        type="text"
        class="input"
        placeholder="Pais"
        formControlName="country"
      />
      <label class="label">Descripcion</label>
      <input
        type="text"
        class="input"
        placeholder="Descripcion"
        formControlName="description"
      />
      <label class="label">Estado</label>
      <select class="select w-full" formControlName="isActive">
        <option [ngValue]="true" selected>Activo</option>
        <option [ngValue]="false">Inactivo</option>
      </select>
    </form>`r`n    @if (error()) {`r`n    <div class="alert alert-error mt-4">{{ error() }}</div>`r`n    }
  </div>
  <div class="card-actions justify-end p-6 pt-0">
    <button class="btn mt-4" (click)="dialogRef.close('Canceled')">
      Cancelar
    </button>
    <button class="btn btn-primary mt-4" [disabled]="saving()" (click)="onSaving()">{{ saving() ? 'Guardando...' : 'Guardar' }}</button>
  </div>
</div>
